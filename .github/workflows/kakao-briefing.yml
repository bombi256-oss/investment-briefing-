name: Kakao Investment Briefing

on:
  schedule:
    - cron: '30 23 * * 0-4'
  workflow_dispatch:

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Generate briefing page and send KakaoTalk
        env:
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
        run: |
          python3 << 'EOF'
          import os, json, requests, yfinance as yf
          from datetime import datetime
          import pytz

          kst = pytz.timezone('Asia/Seoul')
          now = datetime.now(kst).strftime('%Y-%m-%d %H:%M')

          # ── 토큰 갱신 ──────────────────────────────────────
          resp = requests.post("https://kauth.kakao.com/oauth/token", data={
              "grant_type": "refresh_token",
              "client_id": os.environ["KAKAO_CLIENT_ID"],
              "client_secret": os.environ["KAKAO_CLIENT_SECRET"],
              "refresh_token": os.environ["KAKAO_REFRESH_TOKEN"].strip(),
          })
          token_data = resp.json()
          print("Token response:", token_data)
          access_token = token_data["access_token"]

          # ── 주가 데이터 수집 ───────────────────────────────
          tickers = {
              "삼성전자": "005930.KS", "SK하이닉스": "000660.KS",
              "NVDA": "NVDA", "AAPL": "AAPL", "MSFT": "MSFT",
              "JEPQ": "JEPQ", "JEPI": "JEPI",
          }
          rows = []
          for name, sym in tickers.items():
              try:
                  t = yf.Ticker(sym)
                  h = t.history(period="2d")
                  if len(h) >= 2:
                      p = h["Close"].iloc[-1]
                      prev = h["Close"].iloc[-2]
                      chg = (p - prev) / prev * 100
                      rows.append(f"{name}: ${p:.2f} ({chg:+.1f}%)")
              except:
                  pass

          summary = " | ".join(rows[:5])

          # ── HTML 페이지 생성 ───────────────────────────────
          html = f"""<!DOCTYPE html>
          <html lang="ko"><head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>투자 브리핑 {now}</title>
          <style>
          body{{font-family:-apple-system,sans-serif;max-width:600px;margin:0 auto;padding:16px;background:#0a0a0a;color:#eee}}
          h1{{font-size:1.2em;color:#ffd700}}
          .card{{background:#1a1a1a;border-radius:12px;padding:16px;margin:12px 0}}
          .tag{{display:inline-block;background:#2a2a5a;color:#aaf;border-radius:6px;padding:2px 8px;font-size:.8em}}
          .row{{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #333}}
          .up{{color:#ff6b6b}} .dn{{color:#4ecdc4}}
          </style></head><body>
          <h1>📊 투자 브리핑</h1>
          <p style="color:#888;font-size:.85em">{now} KST</p>
          {"".join(f'<div class="row"><span>{r.split(":")[0]}</span><span>{r.split(":",1)[1]}</span></div>' for r in rows)}
          </body></html>"""

          os.makedirs("docs", exist_ok=True)
          with open("docs/index.html", "w", encoding="utf-8") as f:
              f.write(html)
          print("HTML generated")

          # ── 카카오톡 전송 ──────────────────────────────────
          url = "https://bombi256-oss.github.io/investment-briefing-/"
          template = {
              "object_type": "feed",
              "content": {
                  "title": f"📊 투자 브리핑 {now}",
                  "description": summary or "국내/미국 증시 + ETF 현황",
                  "image_url": "https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=800",
                  "link": {"web_url": url, "mobile_web_url": url}
              },
              "buttons": [
                  {"title": "📱 상세 보기", "link": {"web_url": url, "mobile_web_url": url}}
              ]
          }
          r = requests.post(
              "https://kapi.kakao.com/v2/api/talk/memo/default/send",
              headers={"Authorization": f"Bearer {access_token}"},
              data={"template_object": json.dumps(template, ensure_ascii=False)}
          )
          print("KakaoTalk result:", r.text)
          EOF

      - name: Commit HTML
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Update briefing $(date '+%Y-%m-%d')"
          git push
